llm_configs:
  system_prompt: 'Você é um Analista de Investimentos Sênior, especializado em Análise
    Quantitativa e Investimento em Fatores (Factor Investing). Sua principal função
    é atuar como um assistente analítico, ajudando o usuário a extrair insights, interpretar
    dados e avaliar estratégias com base no relatório em PDF fornecido.

    DIRETRIZES DE ATUAÇÃO:

    1. FUNDAMENTAÇÃO NO DOCUMENTO: Sua principal fonte da verdade são os arquivos
    PDF em anexo. Sempre que o usuário fizer uma pergunta, procure a resposta primeiramente
    no documento. Se você utilizar conhecimentos de mercado externos ao PDF para complementar
    a resposta, deixe essa distinção clara para o usuário.

    2. ABORDAGEM FOCADA EM FATORES: Ao avaliar ativos, teses de investimentos ou portfólios,
    direcione a análise para a exposição aos principais fatores de risco (ex: Valor,
    Tamanho, Momento, Qualidade, Baixa Volatilidade, Yield). Avalie como a combinação
    desses fatores afeta a expectativa de retorno.

    3. RIGOR QUANTITATIVO: Sempre que possível, embase suas respostas em métricas
    quantitativas apresentadas no relatório. Destaque elementos fundamentais para
    a análise de fatores, como o cálculo de retornos históricos, matrizes de correlação
    entre ativos, e análises de volatilidade anualizada para avaliar o risco ajustado.

    4. TOM E ESTILO: Mantenha um tom profissional, imparcial, analítico e direto.
    Utilize a terminologia financeira de forma correta, mas com didática suficiente
    para garantir o entendimento da estratégia. Evite jargões desnecessários que não
    agreguem à explicação.

    5. LIMITAÇÃO DE RESPONSABILIDADE (DISCLAIMER): Você é um assistente analítico.
    Quando o usuário pedir recomendações diretas de investimento, forneça cenários
    baseados nos dados e na literatura de investimentos em fatores, mas conclua lembrando
    que as análises têm caráter informativo/educacional e não substituem o aconselhamento
    financeiro personalizado ou a recomendação de um analista credenciado pela CVM.

    Deixe o próprio usuário guiar a conversa, e tente evitar enche-lo de informação
    sem que ele requisite logo de cara. Não faça referências aos arquivos de forma
    desnecessária. Fale sobre as suas referências apenas se for questionado sobre
    isso. '
sobre:
  factor_construction:
    beta_annomalie_factor: '### **Betta Against Beta**


      O fator *Beta Against Beta* consiste no retorno do portfólio *long* nas ações

      com menor beta (1º tercil da ordenação dos ativos) e *short* nas ações de maior

      beta (3º tercil da ordenação), ponderados pelo inverso dos betas de cada

      portfólio.


      Com isso, podemos evitar que o nosso fator caia quando o mercado subir,

      tendo em vista a própria definição de beta.


      De forma prática, é a diferença dos retornos dos portfólios formados pelas

      ações ilíquidas e líquidas.

      '
    illiquidity_factor: '### **Illiquid minus Liquid**


      O fator *Illiquid minus Liquid* consiste no retorno do portfólio *long* nas
      ações

      com menor liquidez (1º tercil da ordenação dos ativos) e *short* nas ações de

      maior liquidez (3º tercil da ordenação).


      De forma prática, é a diferença dos retornos dos portfólios formados pelas

      ações ilíquidas e líquidas.

      '
    market_factor: '### **Fator Mercado**


      Este fator consiste na média da diferença entre o retorno do portfólio de

      mercado ponderado por tamanho (utilizado o índice Ibovespa) e o retorno da

      taxa livre de risco brasileira (utilizado o CDI).

      '
    momentum_factor: '### **Winners minus Loosers**


      O fator *Winners minus Loosers* consiste no retorno do portfólio *long* nas
      ações

      com maior retorno acumulado nos meses t-12 e t-2 (3º tercil da ordenação dos

      ativos) e *short* nas ações de menor retorno (1º tercil da ordenação).


      De forma prática, é a diferença dos retornos dos portfólios formados pelas

      ações vencedoras e perdedoras em termos de retorno acumulado.

      '
    size_factor: '### **Fator Small minus Big**


      O fator *Small minus Big* consiste no retorno do portfólio *long* nas ações
      de

      menor valor de mercado (1º tercil da ordenação dos ativos) e *short* nas ações

      de maior valor (3º tercil da ordenação).


      De forma prática, é a diferença dos retornos dos portfólios formados pelas

      ações de menor e de maior valor de mercado.

      '
    value_factor: '### **Fator High minus Low**


      O fator *High minus Low* consiste no retorno do portfólio *long* nas ações de

      maior razão entre valor contábil e valor de mercado (3º tercil da ordenação

      dos ativos) e *short* nas ações de menor razão (1º tercil da ordenação).


      De forma prática, é a diferença dos retornos dos portfólios formados pelas

      ações de maior e menor razão *book-to-market*.

      '
  methodology_text: "# **Metodologia**\n\nOs portfólios que determinam os fatores\
    \ de risco (bem como estes) foram criados\nde acordo com a metodologia definida\
    \ no relatório metodológico do NEFIN, que\npode ser acessado pelo botão ao fim\
    \ da página. \n\nAinda, é válido ressaltar que os dados do CDI foram retirados\
    \ do Sistema Gerenciador de Séries Temporais, do Banco Central,\ne todos os demais\
    \ dados foram extraídos da plataforma Economática.\n\nPara fins de tornar a checagem\
    \ da metodologia mais acessível enquanto se navega\npor este relatório interativo,\
    \ as principais etapas foram apresentadas abaixo.\n"
  universe: '

    ## **Universo do estudo e corte temporal**


    Para que um ativo seja elegível para o estudo, este deve ser uma ação listada

    na bolsa de valores do Brasil, ativo ou inativo no dia de hoje.


    O corte temporal definido foi entre o período de 2011 e 2025, o que garante um

    histórico suficientemente grande para analisar como os fatores se comportam em

    diferentes momentos da história.

    '
  elegibility: "## **Elegibilidade**\n\nPara que os ativos selecionados sejam inclusos\
    \ na formação dos portfólios de\ndeterminado fator, estes devem atender aos seguintes\
    \ requisitos:\n\n- Ser a ação com maior liquidez da firma;\n- Ter negócios em\
    \ pelo menos 80% dos dias do último ano (ou desde a sua\n  listagem) e volume\
    \ negociado maior que R$ 500.000,00 por dia;\n- Ter sido listada antes do mês\
    \ de dezembro do último ano.\n"
  portfolio_construction:
    beta_annomalie_portfolio: '### **Portfólios ordenados por Beta**


      A cada mês *t* é feita a ordenação das ações elegíveis no ano corrente em

      tercis de acordo com o seu beta referente aos retornos diários dos últimos

      12 meses. Após isso, os retornos dos portfólios do mês *t* são calculados.

      '
    liquidity_portfolio: '### **Portfólios ordenados por Liquidez**


      A cada mês *t* há a ordenação das ações elegíveis em tercis de acordo com o

      volume negociado nos últimos 12 meses. Após isso, os retornos dos portfólios
      no mês *t* são calculados.

      '
    momentum_portfolio: '### **Portfólios ordenados por Momentum**


      A cada mês *t* há a ordenação das ações elegíveis em tercis de acordo com o

      retorno acumulado entre o mês *t*-12 e o *t*-2. Após isso, os retornos dos portfólios
      no mês *t* são calculados.

      '
    size_portfolio: '### **Portfólios ordenados por Tamanho**


      Em todo mês de janeiro há a ordenação das ações elegíveis em tercis de acordo

      com o valor de mercado da firma no mês de dezembro do ano anterior. Após isso,
      os retornos dos portfólios no ano são calculados.

      '
    value_portfolio: '### **Portfólios ordenados por Valor**


      Em todo mês de janeiro há a ordenação das ações elegíveis em tercis de acordo

      com a razão entre o valor contábil e o valor de mercado da empresa no mês de

      junho do ano anterior. Após isso, os retornos dos portfólios no ano são calculados.

      '
